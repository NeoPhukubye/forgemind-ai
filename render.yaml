services:
  - type: web
    name: forgemind-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # set this in the Render dashboard, never commit it here
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ENVIRONMENT
        value: production
